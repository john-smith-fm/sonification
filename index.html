body {

}
.actor {

  color:#555;

}

  letter-spacing:-0.035em;
  line-height:.85;
  color:rgba(255,255,255,.10);
  pointer-events:none;
  white-space:nowrap;
}
#play{
position:absolute;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#e6d300;
border:1px solid #e6d300;
border-radius:999px;
color:#000;
font-size:20px;
font-weight:normal;
padding:12px 28px;
cursor:pointer;
letter-spacing:.02em;
z-index:10;
}
#play.playing{
background:transparent;
border:1px solid #e6d300;
color:#e6d300;
}
svg {
  position:relative;
  z-index:1;
  width:100vw;
  height:calc(100vh - 70px);
  display:block;
}
.axis { stroke:var(--axis); stroke-width:1; }
.tick { stroke:var(--axis); stroke-width:1; opacity:.7; }
.label { fill:var(--text); font-size:16px; }
.tickLabel { fill:#555; font-size:12px; }
.point { fill:var(--point); opacity:.7; cursor:pointer; }
.point.active{fill:#fff36a;opacity:.8}
#tooltip {
  position:fixed;
  display:none;
  background:rgba(0,0,0,.95);
  border:0;
  padding:10px 12px;
  border-radius:0;
  color:white;
  z-index:5;
  max-width:260px;
  line-height:1.35;
  font-size:13px;
}
</style>

function map(v,a,b,c,d){return c+((v-a)/(b-a))*(d-c);}

function stopPlayback(){
 playToken++;

 playBtn.classList.remove('playing');

 currentMovies.forEach(movie=>{
   if(movie.element) movie.element.classList.remove('active');

}

function selectActor(name){
 if(isPlaying){

 [...nav.children].forEach(x=>x.classList.toggle('active',x.textContent===name));
 bg.textContent=name;
 draw();
}

  const l=document.createElementNS(ns,'line');
  l.setAttribute('x1',x1); l.setAttribute('y1',y1);
  l.setAttribute('x2',x2); l.setAttribute('y2',y2);
  l.setAttribute('class',cls); svg.appendChild(l); return l;
 }
 function text(content,x,y,cls='label'){
  const t=document.createElementNS(ns,'text');
  t.textContent=content; t.setAttribute('x',x); t.setAttribute('y',y);
  t.setAttribute('class',cls); svg.appendChild(t); return t;
 }
 line(left,bottom,right,bottom);
 line(left,top,left,bottom);

 const yl=text('IMDb score',54,220,'label');
 yl.setAttribute('transform','rotate(-90 54 220)');
 text('years',right+10,bottom+5,'label');


 currentMovies.forEach(movie=>{
  const age=(movie.age!==undefined && movie.age!==null) ? Number(movie.age) : movie.release-birth;
  const x=map(clamp(age,0,100),0,100,left+20,right-20);
  const y=map(clamp(Number(movie.score),1,10),1,10,bottom-20,top+20);
  const c=document.createElementNS(ns,'circle');
  c.setAttribute('cx',x);
  c.setAttribute('cy',y);
  c.setAttribute('r',6);
  c.setAttribute('class','point');
  c.onclick=(e)=>{
   e.stopPropagation();
   tooltip.style.display='block';
   tooltip.style.left=(e.clientX+12)+'px';
   tooltip.style.top=(e.clientY+12)+'px';
   tooltip.innerHTML=`${movie.title}<br>${movie.release} · age ${age}<br>IMDb: ${movie.score}`;
  };
  movie.element=c;
  svg.appendChild(c);
 });
}

document.body.addEventListener('click',()=>tooltip.style.display='none');

function freq(score){
 const min=55,max=2200;
 const t=(clamp(score,1,10)-1)/9;
 return min*Math.pow(max/min,t);
}

let masterGain=null;
let compressor=null;
let lowpass=null;
let scheduledNodes=[];
let playToken=0;

function ensureAudioGraph(){
 if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();

 if(!masterGain){
   masterGain=audioCtx.createGain();
   masterGain.gain.value=0.55;

   compressor=audioCtx.createDynamicsCompressor();
   compressor.threshold.value=-24;
   compressor.knee.value=24;
   compressor.ratio.value=8;
   compressor.attack.value=0.02;
   compressor.release.value=0.25;

   lowpass=audioCtx.createBiquadFilter();
   lowpass.type='lowpass';
   lowpass.frequency.value=1800;
   lowpass.Q.value=0.7;

   masterGain.connect(lowpass);
   lowpass.connect(compressor);
   compressor.connect(audioCtx.destination);
 }
}

function stopScheduledAudio(){
 scheduledNodes.forEach(node=>{
   try{ node.stop(); }catch(e){}
 });
 scheduledNodes=[];
}

function toneAt(score, startTime, chordSize=1){
 ensureAudioGraph();

 const osc=audioCtx.createOscillator();
 const gain=audioCtx.createGain();

 osc.type='sine';
 osc.frequency.value=freq(score);

 const duration=0.42;
 const attack=0.05;
 const release=0.18;
 const peak=0.20 / Math.sqrt(Math.max(1,chordSize));

 gain.gain.setValueAtTime(0.0001,startTime);
 gain.gain.exponentialRampToValueAtTime(peak,startTime+attack);
 gain.gain.setValueAtTime(peak,startTime+duration-release);
 gain.gain.exponentialRampToValueAtTime(0.0001,startTime+duration);

 osc.connect(gain);
 gain.connect(masterGain);

 osc.start(startTime);
 osc.stop(startTime+duration);

 scheduledNodes.push(osc);
 osc.onended=()=>{
   scheduledNodes=scheduledNodes.filter(n=>n!==osc);
 };
}

playBtn.onclick=async()=>{
 if(isPlaying) return;

 ensureAudioGraph();
 await audioCtx.resume();

 const startedAt=performance.now();
 while(audioCtx.state!=='running' && performance.now()-startedAt<1500){
   await audioCtx.resume();
   await new Promise(r=>setTimeout(r,25));
 }

 const localToken=++playToken;
 isPlaying=true;
 playBtn.classList.add('playing');
 playBtn.textContent='playing';

 try{
   const groups={};

   currentMovies.forEach(movie=>{
     if(!groups[movie.release]){
       groups[movie.release]=[];
     }
     groups[movie.release].push(movie);
   });

   const years=Object.keys(groups).sort((a,b)=>Number(a)-Number(b));

   const step=0.26;
   const visualHold=0.42;
   const leadTime=0.25;
   const startBase=audioCtx.currentTime+leadTime;

   const events=years.map((year,index)=>({
     year,
     start:startBase+index*step,
     end:startBase+index*step+visualHold,
     movies:groups[year]
   }));

   events.forEach(event=>{
     event.movies.forEach(movie=>{
       toneAt(movie.score,event.start,event.movies.length);
     });
   });

   await new Promise(resolve=>{
     function frame(){
       if(localToken!==playToken || !isPlaying){
         resolve();
         return;
       }

       const now=audioCtx.currentTime;

       events.forEach(event=>{
         const active=now>=event.start && now<event.end;

         event.movies.forEach(movie=>{
           if(movie.element){
             movie.element.classList.toggle('active',active);
           }
         });
       });

       const lastEnd=events.length ? events[events.length-1].end : startBase;

       if(now>lastEnd+0.1){
         resolve();
       }else{
         requestAnimationFrame(frame);
       }
     }

     requestAnimationFrame(frame);
   });

 }catch(error){
   console.error(error);
   alert(error.message);
 }finally{
   if(localToken===playToken){
     isPlaying=false;
     playBtn.classList.remove('playing');
     playBtn.textContent='click to play';

     currentMovies.forEach(movie=>{
       if(movie.element) movie.element.classList.remove('active');
     });
   }
 }
};

selectActor(current);
window.onresize=draw;
</script>
